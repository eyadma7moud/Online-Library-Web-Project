<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=bedtime" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap">
    <title>Browse Books — Libraria</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- SIDE MENU -->
    <div class="menu-wrapper">
      <details>
        <summary aria-label="Open navigation menu">
          <div class="icon-bar"><span></span><span></span><span></span></div>
        </summary>
        <nav class="menu">
          <a href="index.html"><span class="menu-icon">🏠</span> Home</a>
          <a href="books.html"><span class="menu-icon">📚</span> Browse Books</a>
          <a href="favourite.html"><span class="menu-icon">❤️</span> Favourite</a>
          <a href="about.html"><span class="menu-icon">ℹ️</span> About Us</a>
          <div class="menu-divider"></div>
        </nav>
      </details>
    </div>

    <!-- TOP NAV -->
    <nav class="topnav">
      <a href="index.html" class="logo">Libraria</a>
      <div class="links">
        <a href="books.html">Browse Books</a>
        <a href="favourite.html">Favourite</a>
        <a href="about.html">About Us</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
      </div>
    </nav>

    <main>
      <div class="content" style="max-width:1100px;">
        <h1>Book Collection</h1>

        <div class="filters">
          <form style="display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; background:transparent; border:none; padding:0; box-shadow:none; max-width:none;">
            <input type="text"  id="search-input" placeholder="Search by title, author or category…" style="flex:1; min-width:180px;" />

            <select id="cat-filter">
              <option value="">All Categories</option>
              <option value="Fiction">Fiction</option>
              <option value="Science">Science</option>
              <option value="History">History</option>
              <option value="Technology">Technology</option>
              <option value="Philosophy">Philosophy</option>
              <option value="Self Development">Self Development</option>
            </select>

            <select id="status-filter">
              <option value="">All Status</option>
              <option value="available">Available</option>
              <option value="borrowed">Borrowed</option>
            </select>

            <button type="button" id="search-btn" class="btn" style="width:auto; padding:12px 28px;">Search</button>
          </form>
        </div>

        <!-- Grid rendered by books-page.js -->
        <div class="books-grid" id="books-grid"></div>
      </div>
    </main>

    <footer>
      <p>© 2026 Libraria — IS231 Web Technology Project</p>
    </footer>

    <script src="theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/books-page.js"></script>
  </body>
</html>
