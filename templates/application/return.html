{% extends 'base.html' %}
{% load static %}

{% block content %}
<main style="padding-top: 40px;">
  <div class="content">
    <h2>Return Book</h2>

    <section>
      <h3>Book Information</h3>
      <p><strong>Title:</strong> {{ book.title }}</p>
      <p><strong>Author:</strong> {{ book.author }}</p>
    </section>

    <section>
      <h3>Confirm Return</h3>
      <form method="POST">
        {% csrf_token %}
        <p>Are you sure you want to return <strong>{{ book.title }}</strong>?</p>
        <button class="btn" type="submit">Confirm Return</button>
        <a href="{% url 'borrowed_books' %}" class="btn" style="background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); margin-left: 10px;">Cancel</a>
      </form>
    </section>
  </div>
</main>
{% endblock %}
