{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Book — Libraria</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- SIDE MENU -->
    <div class="menu-wrapper">
      <details>
        <summary aria-label="Open navigation menu">
          <div class="icon-bar">
            <span></span><span></span><span></span>
          </div>
        </summary>
        <nav class="menu">
          <a href="index.html"><span class="menu-icon">🏠</span> Home</a>
          <a href="books.html"><span class="menu-icon">📚</span> Browse Books</a>
          <a href="favourite.html"><span class="menu-icon">❤️</span> Favourite</a>
          <a href="about.html"><span class="menu-icon">ℹ️</span> About Us</a>
          <div class="menu-divider"></div>
          <a href="admin-dashboard.html" class="dashboard-link"><span class="menu-icon">⚙️</span> Admin Dashboard</a>
        </nav>
      </details>
    </div>

    <!-- TOP NAV -->
    <nav class="topnav">
      <a href="index.html" class="logo">Libraria</a>
      <div class="links">
        <a href="books.html">Browse Books</a>
        <a href="about.html">About Us</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
      </div>
    </nav>

    <hr />

    <main style="padding-top: 40px;">

      <div class="edit-book-header">
        <a href="admin-dashboard.html" class="back-btn">← Back to Dashboard</a>
        <h1>Edit Book</h1>
        <p class="edit-subtitle">Update the book information below</p>
      </div>

      <form class="auth-form edit-book-form" id="edit-book-form">

        <div class="form-row">
          <div class="form-group">
            <label for="edit-title">Book Title</label>
            <input type="text" id="edit-title" placeholder="Enter book title" required />
          </div>
          <div class="form-group">
            <label for="edit-author">Author</label>
            <input type="text" id="edit-author" placeholder="Enter author name" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-category">Category</label>
            <select id="edit-category">
              <option>Fiction</option>
              <option>Science</option>
              <option>History</option>
              <option>Technology</option>
              <option>Philosophy</option>
              <option>Self Development</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-status">Status</label>
            <select id="edit-status">
              <option value="available">Available</option>
              <option value="borrowed">Borrowed</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-year">Publish Year</label>
            <input type="number" id="edit-year" placeholder="Year" />
          </div>
          <div class="form-group">
            <label for="edit-pages">Pages</label>
            <input type="number" id="edit-pages" placeholder="Number of pages" />
          </div>
        </div>

        <label for="edit-description">Book Description</label>
        <textarea id="edit-description" rows="5" placeholder="Write a short description about the book"></textarea>

        <div class="edit-book-actions">
          <button type="submit" class="btn save-btn">💾 Save Changes</button>
          <a href="admin-dashboard.html" class="btn cancel-btn">✕ Cancel</a>
        </div>

      </form>

    </main>

    <hr />
    <footer>
      <p>© 2026 Libraria — IS231 Web Technology Project | Phase 1</p>
    </footer>

    <script src="theme.js"></script>
    <script src="js/auth.js"></script>
    <script>
      protectAdmin();
    </script>
    <script src="js/edit-book.js"></script>
  </body>
</html>
