{% extends 'base.html' %}
{% load static %}

{% block content %}
<main>
  <div class="content" style="max-width: 400px; margin: 50px auto; padding: 30px; background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--border);">
    <h2 style="text-align: center; margin-bottom: 24px;">Login</h2>

    {% if messages %}
      {% for message in messages %}
        <p style="color: var(--accent-red); font-size: 14px; text-align: center; margin-bottom: 16px;">{{ message }}</p>
      {% endfor %}
    {% endif %}

    <form class="auth-form" method="POST">
      {% csrf_token %}
      <label style="display: block; margin-bottom: 8px; font-weight: 500;">Username</label>
      <input type="text" name="username" placeholder="Enter username" required 
             style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary);">

      <label style="display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
      <input type="password" name="password" placeholder="Enter password" required 
             style="width: 100%; padding: 12px; margin-bottom: 24px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary);">

      <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>

    <p style="margin-top: 20px; text-align: center; font-size: 14px;">
      Don't have an account?
      <a href="{% url 'register' %}" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Register</a>
    </p>
  </div>
</main>
{% endblock %}
