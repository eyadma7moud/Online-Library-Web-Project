{% extends 'base.html' %}
{% load static %}

{% block content %}
<main style="text-align:center; padding-top: 80px;">
  <div style="font-size: 4rem; margin-bottom: 16px;">✅</div>
  <h2>Return Successful!</h2>
  <p>You have returned <strong>{{ book.title }}</strong>.</p>
  <p>Author: {{ book.author }}</p>
  <p>Thank you for returning the book on time!</p>
  <br />
  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
    <a href="{% url 'borrow_history' %}" class="btn" style="width:auto;">View History</a>
    <a href="{% url 'books' %}" class="btn" style="width:auto; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border);">Browse Books</a>
  </div>
</main>
{% endblock %}
