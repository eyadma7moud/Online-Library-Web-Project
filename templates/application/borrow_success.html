{% extends 'base.html' %}
{% load static %}

{% block content %}
<main style="text-align:center; padding-top: 80px;">
  <div style="font-size: 4rem; margin-bottom: 16px;">📚</div>
  <h2>Borrow Successful!</h2>
  <p>You have successfully borrowed <strong>{{ book.title }}</strong>.</p>
  <p>Author: {{ book.author }}</p>
  <br />
  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
    <a href="{% url 'borrowed_books' %}" class="btn" style="width:auto;">My Borrowed Books</a>
    <a href="{% url 'books' %}" class="btn" style="width:auto; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border);">Browse More Books</a>
  </div>
</main>
{% endblock %}
