<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">Libraria</a>
      <div class="links">
        <a href="books.html">Browse Books</a>
        <a href="favourite.html">Favourite</a>
        <a href="about.html">About Us</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a class="dashboard" href="admin-dashboard.html">Admin Dashboard</a>
      </div>
    </nav>

    <main>
      <div class="content">
        <h2>Register</h2>

        <form action="login.html" method="GET" class="auth-form">
          <label>Full Name</label>
          <input
            type="text"
            name="fullname"
            placeholder="Enter your full name"
            required
          />
          <br />
          <label>Age</label>
          <input
            type="number"
            name="age"
            placeholder="Enter your age"
            required
          />
          <br />
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required /> <br />
          
          <label>Phone</label>
          <input type="phone" placeholder="Enter your phone" required /> <br />

          <label>Password</label>
          <input type="password" placeholder="Enter password" required /> <br />

          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password" required />
          <br />

          <button type="submit">Register</button>
        </form>
      </div>
    </main>

    <footer>
      <p>© 2026 Libraria — IS231 Web Technology Project | Phase 1</p>
    </footer>
  </body>
</html>
