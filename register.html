    <!-- TOP NAV -->

        <a href="books.html">Browse Books</a>

          class="theme-toggle"
          id="themeToggle"
          aria-label="Toggle dark mode"
        >
          🌙
        </button>
      </div>

    <main>
      <div class="content">
        <h2>Register</h2>

        <!-- رسالة الخطأ -->
        <p id="register-error" style="color: red; display: none"></p>

        <form class="auth-form" id="register-form">
          <label>Full Name</label>
          <input
            type="text"
            id="fullname"
            placeholder="Enter your full name"
            required
          />

          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />

          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter password"
            required
            minlength="6"
          />

          <label>Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            placeholder="Confirm password"
            required
            minlength="6"
          />

          <button type="submit">Register</button>
        </form>

        <p style="margin-top: 12px">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>
    </main>

    <footer>
      <p>© 2026 Libraria — IS231 Web Technology Project | Phase 1</p>
    </footer>

    <script src="theme.js"></script>
      <script src="js/auth.js"></script>    <script>
      if (isLoggedIn()) {
        window.location.href = "profile.html";
      }

      document
        .getElementById("register-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const name = document.getElementById("fullname").value.trim();
          const email = document.getElementById("email").value.trim();
          const pass = document.getElementById("password").value;
          const confirm = document.getElementById("confirm-password").value;
          handleRegister(name, email, pass, confirm, "register-error");
        });
    </script>
  </body>
</html>
