<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard - Online Library</title>
    <meta
      name="description"
      content="Admin dashboard to manage books in the online library"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=bedtime"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  
  <body>
    <nav>
      <a href="index.html" class="logo">Libraria</a>
      <div class="links">
        <a href="books.html">Browse Books</a>
        <a href="favourite.html">Favourite</a>
        <a href="about.html">About Us</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="profile.html">User Profile</a>
        <a class="dashboard" href="admin-dashboard.html">Admin Dashboard</a>
        <a href="#"><span class="material-symbols-outlined"> bedtime </span></a>
      </div>
    </nav>
    <hr />
    <main class="dashboard">
      <h2 class="dashboard-title">Admin Dashboard</h2>
      
      <div class="stats">
        <div class="stat-box">
          <h3>Total Books</h3>
          <p id="total-books">0</p>
        </div>
        
        <div class="stat-box">
          <h3>Borrowed Books</h3>
          <p id="borrowed">0</p>
        </div>
        
        <div class="stat-box">
          <h3>Users</h3>
          <p id="total-users">50</p>
        </div>
      </div>
      
      <div class="dashboard-actions">
        <a href="add-book.html" class="btn">Add New Book</a>
      </div>
      
      <div class="dashboard-search">
        <input type="text" placeholder="Search book..." />
        <button>Search</button>
      </div>
      
      <table class="books-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        
        <tbody>
          <tr>
            <td>Clean Code</td>
            <td>Robert C. Martin</td>
            <td class="status-available">Available</td>
            <td>
              <button class="action-btn edit-btn">Edit</button>
              <button class="action-btn delete-btn">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </main>
    <hr />
    
    <footer>
      <p>© 2026 Online Library — IS231 Web Technology Project | Phase 1</p>
    </footer>

    <script src="js/books.js"></script>
    <script src="js/users.js"></script>
  </body>
  </html>
