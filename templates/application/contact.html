{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=bedtime" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap">

  <title>Online Library</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- SIDE MENU -->
  <div class="menu-wrapper">
    <details>
      <summary aria-label="Open navigation menu">
        <div class="icon-bar">
          <span></span><span></span><span></span>
        </div>
      </summary>
      <nav class="menu">
        <a href="{% url 'home' %}"><span class="menu-icon">🏠</span> Home</a>
        <a href="{% url 'books' %}"><span class="menu-icon">📚</span> Browse Books</a>
        <a href="{% url 'favourite' %}"><span class="menu-icon">❤️</span> Favourite</a>
        <a href="{% url 'about' %}"><span class="menu-icon">ℹ️</span> About Us</a>
        <div class="menu-divider"></div>
        <a href="/login/"><span class="menu-icon">🔑</span> Login</a>
        <a href="{% url 'register' %}"><span class="menu-icon">📝</span> Register</a>
        <a href="{% url 'profile' %}"><span class="menu-icon">👤</span> User Profile</a>
        <div class="menu-divider"></div>
        <a href="{% url 'admin_dashboard' %}" class="dashboard-link"><span class="menu-icon">⚙️</span> Admin Dashboard</a>
      </nav>
    </details>
  </div>

  <!-- TOP NAV -->
  <nav class="topnav">
    <a href="{% url 'home' %}" class="logo">Libraria</a>
    <div class="links">
      <a href="{% url 'books' %}">Browse Books</a>
      <a href="{% url 'favourite' %}">Favourite</a>
      <a href="{% url 'about' %}">About Us</a>
      <a href="/login/">Login</a>
      <a href="{% url 'register' %}">Register</a>
      <a href="{% url 'profile' %}">User Profile</a>
      <a class="dashboard" href="{% url 'admin_dashboard' %}">Admin Dashboard</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <main>
    >
    <div class="content">
      <h2>[Contact Us Page]</h2>
    </div>
  </main>

  <footer>
    <p>© 2026 Libraria — IS231 Web Technology Project | Phase 1</p>
  </footer>
  <script src="theme.js"></script>
</body>

</html>
