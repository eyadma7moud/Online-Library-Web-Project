<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <title>Online Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">Libraria</a>
      <div class="links">
        <a href="books.html">Browse Books</a>
        <a href="favourite.html">Favourite</a>
        <a href="about.html">About Us</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </nav>

    <main class="hero">
      <h1>Discover & Borrow Great Books</h1>
      <p>
        Your online gateway to thousands of books. Search, explore and borrow
        easily.
      </p>

      <div class="search-box">
        <form action="search_results.html" method="GET">
          <select name="search_type" required>
            <option value="">Search By</option>
            <option value="title">Title</option>
            <option value="author">Author</option>
            <option value="category">Category</option>
          </select>

          <input
            type="text"
            name="keyword"
            placeholder="Search for any book..."
            minlength="2"
            required
          />

          <input type="submit" value="Search" />
        </form>
      </div>

      <a href="books.html" class="btn">Browse Collection</a>
    </main>

    <footer>
      <p>© 2026 Libraria — IS231 Web Technology Project | Phase 1</p>
    </footer>
  </body>
</html>
