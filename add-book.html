<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard - Online Library</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=bedtime"
    />
    <meta
      name="description"
      content="Admin dashboard to manage books in the online library"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav>
      <a href="index.html" class="logo">Libraria</a>
      <div class="links">
        <a href="books.html">Browse Books</a>
        <a href="favourite.html">Favourite</a>
        <a href="about.html">About Us</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="profile.html">User Profile</a>
        <a class="dashboard" href="admin-dashboard.html">Admin Dashboard</a>
        <a href="#"><span class="material-symbols-outlined"> bedtime </span></a>
      </div>
    </nav>

    <hr />

    <main style="padding-top: 40px">
      <h1>Add New Book</h1>

      <form class="auth-form" id="add-book-form">
        <label>Book Title</label>
        <input type="text" id="title" placeholder="Enter book title" required />

        <label>Author</label>
        <input
          type="text"
          id="author"
          placeholder="Enter author name"
          required
        />

        <label>Category</label>
        <select id="category">
          <option>Fiction</option>
          <option>Science</option>
          <option>History</option>
          <option>Technology</option>
          <option>Philosophy</option>
        </select>

        <label>Publish Year</label>
        <input type="number" id="year" placeholder="Year" />

        <label>Pages</label>
        <input type="number" id="pages" placeholder="Number of pages" />

        <label>Book Description</label>

        <textarea
          id="description"
          rows="5"
          placeholder="Write a short description about the book"
        ></textarea>

        <label>Status</label>
        <select id="status">
          <option>Available</option>
          <option>Borrowed</option>
        </select>

        <br /><br />

        <button type="submit">Add Book</button>
      </form>
    </main>
    <hr />

    <footer>
      <p>© 2026 Online Library — IS231 Web Technology Project | Phase 1</p>
    </footer>
    <script src="js/add-book.js"></script>
  </body>
</html>
