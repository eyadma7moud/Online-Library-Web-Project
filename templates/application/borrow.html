{% extends 'base.html' %}
{% load static %}

{% block content %}
<main style="padding-top: 40px;">
  <div class="content">
    <h2>Borrow Book</h2>

    <section>
      <h3>Book Information</h3>
      <p><strong>Title:</strong> {{ book.title }}</p>
      <p><strong>Author:</strong> {{ book.author }}</p>
    </section>

    <section>
      <h3>Confirm Borrow</h3>
      <form method="POST">
        {% csrf_token %}
        <p>Are you sure you want to borrow <strong>{{ book.title }}</strong>?</p>
        <button class="btn" type="submit">Confirm Borrow</button>
        <a href="{% url 'books' %}" class="btn" style="background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); margin-left: 10px;">Cancel</a>
      </form>
    </section>
  </div>
</main>
{% endblock %}
