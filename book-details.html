<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=bedtime" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap">
    <title>Book Details — Libraria</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- SIDE MENU -->
    <div class="menu-wrapper">
      <details>
        <summary aria-label="Open navigation menu">
          <div class="icon-bar"><span></span><span></span><span></span></div>
        </summary>
        <nav class="menu">
          <a href="index.html"><span class="menu-icon">🏠</span> Home</a>
          <a href="books.html"><span class="menu-icon">📚</span> Browse Books</a>
          <a href="favourite.html"><span class="menu-icon">❤️</span> Favourite</a>
          <a href="about.html"><span class="menu-icon">ℹ️</span> About Us</a>
          <div class="menu-divider"></div>
        </nav>
      </details>
    </div>

    <!-- TOP NAV -->
    <nav class="topnav">
      <a href="index.html" class="logo">Libraria</a>
      <div class="links">
        <a href="books.html">Browse Books</a>
        <a href="favourite.html">Favourite</a>
        <a href="about.html">About Us</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
      </div>
    </nav>

    <section class="details-container">
      <div class="book-card">
        <h1 id="book-title">Loading…</h1>
        <h3 id="book-author"></h3>

        <p class="category" id="book-category"></p>
        <p class="year"     id="book-year"></p>
        <p class="pages"    id="book-pages"></p>

        <p class="description" id="book-description"></p>

        <div class="author-info">
          <h4>About the Author</h4>
          <p id="book-author-bio"></p>
        </div>

        <!-- Status badge — updated dynamically -->
        <p id="book-status" class="status-available">✓ Available</p>

        <div class="buttons">
          <!-- Borrow button — shown only when available and user hasn't borrowed -->
          <a id="borrow-btn" href="#" class="btn">Borrow Book</a>

          <!-- Return button — shown only when current user has borrowed this book -->
          <a id="return-btn" href="#" class="btn btn-secondary" style="display:none;">Return Book</a>

          <!-- Always visible -->
          <a href="books.html" class="btn btn-secondary">Return to Library</a>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 Libraria — IS231 Web Technology Project</p>
    </footer>

    <script src="theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/book-details.js"></script>
  </body>
</html>
