{% extends 'base.html' %}
{% load static %}
{% block content %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login — Libraria</title>

    <!-- Fonts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>

    <!-- SIDE MENU -->
    <div class="menu-wrapper">
      <details>
        <summary aria-label="Open navigation menu">
          <div class="icon-bar"><span></span><span></span><span></span></div>
        </summary>

        <nav class="menu">
          <a href="/"><span class="menu-icon">🏠</span> Home</a>
          <a href="/books/"><span class="menu-icon">📚</span> Browse Books</a>
          <a href="/favourite/"><span class="menu-icon">❤️</span> Favourite</a>
          <a href="/about/"><span class="menu-icon">ℹ️</span> About Us</a>

          <div class="menu-divider"></div>

          <a href="/login/"><span class="menu-icon">🔑</span> Login</a>
          <a href="/register/"><span class="menu-icon">📝</span> Register</a>
          <a href="/profile/"><span class="menu-icon">👤</span> User Profile</a>

          <div class="menu-divider"></div>

          <a href="/admin-dashboard/" class="dashboard-link">
            <span class="menu-icon">⚙️</span> Admin Dashboard
          </a>
        </nav>
      </details>
    </div>


    <!-- MAIN -->
    <main>
      <div class="content">
        <h2>Login</h2>

        <p id="login-error" style="color: red; display: none"></p>

        <form class="auth-form" id="login-form">
          <label for="emailOrUser">Email</label>
          <input
            type="email"
            id="emailOrUser"
            placeholder="Enter your email"
            required
          />

          <label for="pass">Password</label>
          <input
            type="password"
            id="pass"
            placeholder="Enter password"
            required
          />

          <button type="submit" style="width: 100%; margin-top: 8px">
            Login
          </button>
        </form>

        <p style="margin-top: 12px">
          Don't have an account?
          <a href="/register/">Register</a>
        </p>
      </div>
    </main>


    <!-- JS -->
    <script src="{% static 'js/theme.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>

    <script>
      if (isLoggedIn()) {
        window.location.href = isAdmin()
          ? "/admin-dashboard/"
          : "/profile/";
      }

      document
        .getElementById("login-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const email = document.getElementById("emailOrUser").value.trim();
          const pass = document.getElementById("pass").value;

          handleLogin(email, pass, "login-error");
        });
    </script>

  </body>
</html>
{% endblock content %}
